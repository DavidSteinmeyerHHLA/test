name: Enforce PR Source Branch

on:
  pull_request:
    branches:
      - main
      - development

jobs:
  check-source-branch:
    name: Check if PR comes from development
    runs-on: ubuntu-latest
    steps:
      - name: Validate Source and Target
        run: |
          TARGET="${{ github.base_ref }}"
          SOURCE="${{ github.head_ref }}"

          echo "Target-Branch (Base): $TARGET"
          echo "Source-Branch (Head): $SOURCE"

          if [ "$TARGET" == "main" ]; then
            if [ "$SOURCE" != "development" ]; then
              echo "❌ Pull Requests into 'main' are only allowed from 'development'!"
              exit 1
            fi
          fi

          echo "✅ Pull Request valid."
          exit 0